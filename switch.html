<!doctype html>
<html lang="nl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width" />
    <title>Switch control / Progressive Enhancement / FDND</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap"
      rel="stylesheet"
    />
    <link href="assets/styles.css" rel="stylesheet" />
    <style>
      :root {
        color-scheme: light dark;
      }
      /* Schrijf hier gewoon je CSS voor dit component */
      input[type="checkbox"] {
        appearance: none;
        width: 3.125rem;
        height: 1.75rem;
        background-color: green;
        border-radius: 3rem;
        position: relative;
        cursor: pointer;
        transition: background-color 0.3s;
        rotate: 180deg;
      }

      input[type="checkbox"]::after {
        content: "AAN";
        font-size: 0.6rem;
        color: black;
        display: flex;
        align-items: center;
        justify-content: center;
        rotate: 180deg;
        position: absolute;
        top: 3px;
        left: 3px;
        width: 1.3rem;
        height: 1.3rem;
        background-color: white;
        border-radius: 50%;
        transition: left 0.3s;

        /* @supports (color: light-dark(blue, pink)) { */
        color: light-dark(blue, pink);
        /* } */
      }

      input[type="checkbox"]:checked {
        background-color: grey;
      }

      input[type="checkbox"]:checked::after {
        content: "";
        left: 25px;
      }
      /* Hint: Dit component kun je volledig met HTML en CSS bouwen */

      /* Hint: Hoe ver ga je qua styling? Vraag jezelf dit altijd af */
    </style>
  </head>
  <body>
    <form>
      <h1>Switch control</h1>
      <label>
        checkbox
        <input type="checkbox" />
      </label>
    </form>
    <!-- Hint: Safari heeft hiervoor iets bedacht, maar is dat al een standaard?
		     Wat gebeurt er in browsers die dat nog niet ondersteunen? -->

    <details open>
      <summary>Demo video</summary>
      <video
        src="assets/switch.mp4"
        width="119"
        height="67"
        controls
        muted
        autoplay
        loop
      >
        <a href="assets/switch.mp4">assets/switch.mp4</a>
      </video>
    </details>
  </body>
</html>
